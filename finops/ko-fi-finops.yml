description: >-
  FinOps view of Ko-fi spend. Ko-fi is a monetization platform, so cost flows in
  two directions. Ko-fi does not bill for API/webhook usage; instead it takes a
  platform fee out of the money you collect (0% on tips and donations; 5% on
  memberships, shop sales, and commissions on the Free plan). Ko-fi Gold is a
  flat monthly subscription that removes the 5% platform fee. Separately,
  third-party payment processors (PayPal, Stripe) charge roughly 2.9% + $0.30
  per transaction on both plans. There is no metered per-request or per-webhook
  charge.
notes: >-
  Fee percentages and the Ko-fi Gold monthly price should be verified on
  ko-fi.com/pricing during reconciliation. Processor fees are set by PayPal and
  Stripe, not Ko-fi, and vary by region and payout method.
