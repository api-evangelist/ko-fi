meters:
- name: platform_fee_memberships_shop_commissions
  description: 5% platform fee taken from memberships, shop sales, and commissions on the Free plan (0% on Ko-fi Gold).
  unit: percent
  aggregation: sum
  dimensions:
  - account
  - payment_type
- name: platform_fee_tips
  description: Platform fee on tips and donations - 0% on both plans.
  unit: percent
  aggregation: sum
  dimensions:
  - account
- name: gold_subscription
  description: Flat monthly Ko-fi Gold subscription that removes the 5% platform fee.
  unit: months
  aggregation: sum
  dimensions:
  - account
- name: processor_fee
  description: Third-party payment processor fee (~2.9% + $0.30 per transaction) charged by PayPal or Stripe.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - processor
principles:
- name: Visibility
  description: Reconcile Ko-fi payout reports against the webhook events your endpoint receives (by kofi_transaction_id) to see gross revenue, platform fee, and processor fee per payment type.
- name: Allocation
  description: Split revenue and fees by payment type - tips, memberships, shop, commissions - since only tips/donations are truly 0% fee.
- name: Optimization
  description: Compare the 5% platform fee against the flat Ko-fi Gold subscription; Gold pays for itself once monthly membership/shop/commission revenue exceeds roughly $240.
- name: Accountability
  description: Assign an owner to review monthly Ko-fi payouts, Gold subscription cost, and processor fees against creator revenue targets.
