aid: ko-fi
url: https://raw.githubusercontent.com/api-evangelist/ko-fi/refs/heads/main/apis.yml
name: Ko-fi
kind: company
description: >-
  Ko-fi is a creator monetization platform where fans support creators through
  one-off tips ("buy me a coffee"), recurring memberships, digital and physical
  shop products, and paid commissions. Ko-fi charges 0% platform fee on tips and
  donations. Its developer surface is intentionally narrow and integration-only:
  Ko-fi does not publish a public REST API. Instead it offers an outbound
  WEBHOOK that HTTP POSTs payment notifications (donations, subscription /
  membership payments, shop orders, and commissions) to a URL you configure on
  your Ko-fi webhooks page. Each POST is application/x-www-form-urlencoded with a
  single "data" field carrying a JSON payload, and includes a verification_token
  so you can confirm the request originated from Ko-fi. The webhook is one-way
  (Ko-fi to your endpoint) and fires only when a payment happens - there is no
  request/response API to read, create, or manage donations, members, or orders.
