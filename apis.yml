  name: Ko-fi Webhook
  tags:
  - Webhooks
  - Payments
  - Donations
  - Memberships
  - Shop Orders
  - Commissions
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://help.ko-fi.com/hc/en-us/articles/360004162298-Does-Ko-fi-have-an-API-or-webhook
  properties:
  - url: https://help.ko-fi.com/hc/en-us/articles/360004162298-Does-Ko-fi-have-an-API-or-webhook
    type: Documentation
  - url: https://ko-fi.com/manage/webhooks
    type: Console
  - url: asyncapi/ko-fi-asyncapi.yml
    type: AsyncAPI
  description: >-
    Outbound webhook that Ko-fi HTTP POSTs to a URL you configure whenever a
    payment happens on your Ko-fi page. The single POST body is form-encoded
    with a "data" field containing a JSON payload; a "type" field distinguishes
    the event - Donation, Subscription, Shop Order, or Commission - and a
    verification_token confirms the request came from Ko-fi. This is a one-way,
    server-to-endpoint notification, not a readable/queryable REST API. Modeled
    in asyncapi/ko-fi-asyncapi.yml as an inbound HTTP webhook (not WebSocket).
